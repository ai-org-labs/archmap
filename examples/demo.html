<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ArchMap demo</title>
  <style>
    :root {
      --archmap-bg: #ffffff;
      --archmap-node-fill: #f7f9fc;
      --archmap-node-stroke: #34507a;
      --archmap-edge-stroke: #6678a0;
      --archmap-zone-fill: rgba(80,120,200,0.06);
      --archmap-zone-stroke: #9bb0d4;
    }
    html, body { height: 100%; }
    body { margin: 0; display: grid; grid-template-rows: auto minmax(0, 1fr); overflow: hidden; font: 14px system-ui, sans-serif; color: #1c2733; background: #eef1f6; }
    header { padding: 12px 16px; background: #1c2733; color: #fff; }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; }
    header span { opacity: 0.6; font-weight: 400; }
    main { --editor-width: 360px; display: grid; grid-template-columns: var(--editor-width) 8px minmax(0, 1fr); gap: 0; min-height: 0; overflow: hidden; }
    .panel { position: relative; display: flex; flex-direction: column; min-width: 260px; min-height: 0; border-right: 1px solid #d4dae6; background: #fff; }
    .panel-top { padding: 8px 10px; border-bottom: 1px solid #d4dae6; display: flex; align-items: center; gap: 8px; }
    .editor { flex: 1; min-height: 0; display: grid; grid-template-columns: 42px minmax(0, 1fr); overflow: hidden; background: #fff; }
    .line-numbers { margin: 0; overflow: hidden; padding: 12px 8px 40px 0; border-right: 1px solid #e2e8f0; background: #f8fafc; color: #94a3b8; font: 12px/1.5 ui-monospace, monospace; text-align: right; user-select: none; white-space: pre; }
    textarea { box-sizing: border-box; min-width: 0; height: 100%; border: 0; padding: 12px 12px 40px; font: 12px/1.5 ui-monospace, monospace; resize: none; outline: none; overflow: auto; white-space: pre; }
    .resize-handle { cursor: col-resize; background: linear-gradient(90deg, #d7dde8, #eef1f6); border-right: 1px solid #d4dae6; }
    .resize-handle:hover, .resize-handle.is-dragging { background: #b9c7dc; }
    button { padding: 6px 14px; border: 0; border-radius: 6px; background: #34507a; color: #fff; cursor: pointer; }
    .sample-picker { min-width: 0; flex: 1; padding: 6px 28px 6px 10px; border: 1px solid #cbd5e1; border-radius: 6px; background: #fff; color: #1c2733; font: 12px system-ui, sans-serif; }
    .diagram { position: relative; overflow: auto; padding: 16px; min-height: 0; box-sizing: border-box; }
    .diagram.is-fullscreen { position: fixed; inset: 0; z-index: 20; height: 100vh; background: #eef1f6; }
    .diagram.is-fullscreen .diagram-tags { width: min(980px, calc(100% - 24px)); }
    #diagram { height: 100%; min-height: 0; }
    .diagram.is-fullscreen #diagram { height: calc(100vh - 32px); min-height: calc(100vh - 32px); }
    #diagram canvas { display: block; width: 100%; min-height: 100%; }
    .diagram.is-fullscreen #diagram canvas { min-height: calc(100vh - 32px); }
    .diagram svg.archmap { display: block; background: #fff; border: 1px solid #d4dae6; border-radius: 8px; max-width: none; height: auto; }
    .diagram-loading { position: absolute; inset: 0; z-index: 10; display: none; align-items: center; justify-content: center; gap: 10px; background: rgba(248,250,252,0.62); backdrop-filter: blur(1px); color: #334155; font: 700 13px system-ui, sans-serif; pointer-events: none; }
    .diagram-loading-spinner { width: 22px; height: 22px; border-radius: 999px; border: 3px solid rgba(100,116,139,0.25); border-top-color: #2563eb; animation: archmap-spin 0.75s linear infinite; }
    @keyframes archmap-spin { to { transform: rotate(360deg); } }
    .diagram-tags { position: sticky; top: 12px; left: 12px; z-index: 5; width: min(740px, calc(100% - 24px)); margin-bottom: -42px; display: flex; align-items: flex-start; gap: 8px; pointer-events: none; }
    .diag-log { position: absolute; left: 0; right: 0; bottom: 0; z-index: 3; max-height: 160px; overflow: auto; padding: 8px 12px; border-top: 1px solid #d4dae6; background: rgba(255,255,255,0.94); font: 11px ui-monospace, monospace; }
    .err { color: #b3261e; }
    .warn { color: #a06a00; }
  </style>
</head>
<body>
  <header><h1>ArchMap <span>demo</span></h1></header>
  <main>
    <div class="panel">
      <div class="panel-top">
        <button id="run">Render</button>
        <select id="sample-select" class="sample-picker" aria-label="Load sample"></select>
      </div>
      <div class="editor">
        <pre class="line-numbers" id="line-numbers" aria-hidden="true">1</pre>
        <textarea id="src" spellcheck="false"></textarea>
      </div>
      <div class="diag-log" id="log"></div>
    </div>
    <div class="resize-handle" id="resize-handle" role="separator" aria-orientation="vertical" aria-label="Resize editor"></div>
    <div class="diagram">
      <!-- Toolbar is rendered by createDiagramTags() into this container. -->
      <div class="diagram-tags" id="diagram-tags"></div>
      <div class="diagram-loading" id="loading"><span class="diagram-loading-spinner" aria-hidden="true"></span><span>Rendering</span></div>
      <div id="diagram"></div>
    </div>
  </main>

  <script type="text/plain" id="seed">
graph LR
  subgraph ShopperJourney
    Home[Home]
    Login[Login]
    Checkout[Checkout]
    Complete[Complete]
  end

  Home -->|start| Login
  Login -->|submit| Checkout
  Checkout -->|place order| APIGW[Order API]
  APIGW -->|write order| OrdersDB[(Orders DB)]
  APIGW -->|open payment| Payment[Payment Provider]
  Payment -->|success| Complete
  FirebaseAuth[Firebase Auth] -->|issues token| Login
  APIGW -->|metrics| Monitor[Ops Monitor]
---
mode: screenflow
title: "Release sample: checkout flow"
description: "Lightweight sample covering Overview, Layer, Prototype, and all Add info overlays."
nodes:
  Home:
    zone: web
    layer: client
    kind: page
    frame: { device: desktop, width: 960, height: 640 }
  Login:
    zone: web
    layer: client
    kind: form
    frame: { device: desktop, width: 960, height: 640 }
  Checkout:
    zone: web
    layer: client
    kind: form
    frame: { device: desktop, width: 960, height: 640 }
  Complete:
    zone: web
    layer: client
    kind: completion_screen
    frame: { device: desktop, width: 960, height: 640 }
  FirebaseAuth:
    zone: identity
    layer: identity
    kind: identity_provider
    provider: firebase
  APIGW:
    zone: backend
    layer: edge
    kind: api_gateway
    provider: gcp
    principal: order-api-sa
  OrdersDB:
    zone: backend
    layer: data
    kind: relational_database
    provider: gcp
  Payment:
    zone: external_payment
    layer: external
    kind: external_page
    provider: stripe
    frame: { device: webview, width: 960, height: 640 }
  Monitor:
    zone: operations
    layer: operations
    kind: monitoring
    provider: datadog
edges:
  Home->Login:
    flow: navigate
    trigger: click
    hotspot: { x: 96, y: 120, width: 320, height: 160 }
  Login->Checkout:
    flow: submit
    trigger: submit
    data: customer_profile
    auth: { token: JWT, issuer: FirebaseAuth, validatedBy: APIGW }
    hotspot: { x: 560, y: 440, width: 280, height: 64 }
  Checkout->APIGW:
    flow: submit
    trigger: submit
    data: order_request
    auth: { token: JWT, issuer: FirebaseAuth, validatedBy: APIGW }
    boundaryCrossing: true
    hotspot: { x: 560, y: 440, width: 280, height: 64 }
  APIGW->OrdersDB:
    flow: data_access
    trigger: submit
    data: order_request
    principal: order-api-sa
  APIGW->Payment:
    flow: redirect
    trigger: redirect
    data: payment_session
    boundaryCrossing: true
  Payment->Complete:
    flow: success
    trigger: redirect
    data: payment_result
    boundaryCrossing: true
  FirebaseAuth->Login:
    flow: token_issue
    trigger: redirect
    auth: { token: JWT, issuer: FirebaseAuth, recipient: Login }
    boundaryCrossing: true
  APIGW->Monitor:
    flow: telemetry_export
    trigger: auto
    data: ops_event
    boundaryCrossing: true
identities:
  order-api-sa: { kind: service_account, provider: gcp, attachedTo: APIGW }
data:
  customer_profile:
    label: Customer Profile
    classification: personal
    storage: transient
    flows: [Login->Checkout]
  order_request:
    label: Order Request
    classification: confidential
    storage: durable
    storedIn: [OrdersDB]
    flows: [Checkout->APIGW, APIGW->OrdersDB]
  payment_session:
    label: Payment Session
    classification: restricted
    storage: transient
    flows: [APIGW->Payment]
  payment_result:
    label: Payment Result
    classification: restricted
    storage: transient
    flows: [Payment->Complete]
  ops_event:
    label: Operational Event
    classification: internal
    storage: transient
    flows: [APIGW->Monitor]
permissions:
  api_db_writer:
    principal: order-api-sa
    action: write
    resource: OrdersDB
    role: roles/cloudsql.client
zones:
  web:
    label: Web Experience
    kind: client
    contains: [Home, Login, Checkout, Complete]
  identity:
    label: Identity
    kind: identity
    contains: [FirebaseAuth]
  backend:
    label: Backend
    kind: cloud
    contains: [APIGW, OrdersDB]
  external_payment:
    label: External Payment
    kind: partner
    contains: [Payment]
  operations:
    label: Operations
    kind: operations
    contains: [Monitor]
boundaries:
  public_edge:
    label: Public Edge Boundary
    kind: trust_boundary
    contains:
      - zone: web
      - zone: backend
  payment_boundary:
    label: Payment Provider Boundary
    kind: trust_boundary
    contains:
      - zone: external_payment
  operations_boundary:
    label: Operations Boundary
    kind: policy_boundary
    contains:
      - zone: operations
scenarios:
  checkout_happy_path:
    label: Checkout happy path
    start: Home
    steps:
      - Home->Login
      - Login->Checkout
      - Checkout->APIGW
      - APIGW->Payment
      - Payment->Complete
view:
  default:
    base: overview
    overlays: [subgraph, zone, auth, dataflow, boundary, permission, validation]
  </script>

  <!--
    Static, no-build demo. Core + 3D load from the local build (run
    `npm run build` first); icons and three.js load from CDN. For a pure-CDN
    page, map "@archmap/core" to https://cdn.jsdelivr.net/npm/@archmap/core@<ver>/dist/archmap.js
    and three-view to .../dist/views3d/three-view.js (needs a complete publish).
  -->
  <script type="importmap">
  {
    "imports": {
      "@archmap/core": "../dist/archmap.js",
      "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js",
      "three/": "https://cdn.jsdelivr.net/npm/three@0.185.0/",
      "@archmap/icons": "https://cdn.jsdelivr.net/npm/@archmap/icons@0.1.2/+esm"
    }
  }
  </script>
  <script type="module">
    import { DEFAULT_ARCHMAP_SAMPLE_ID, DEFAULT_ARCHMAP_SAMPLES, createDiagramTags, parse, render, registerIcon } from "@archmap/core";
    import { installCloudProviderIcons, installFamousServiceIcons } from "@archmap/icons";
    import { installThreeView } from "../dist/views3d/three-view.js";

    installCloudProviderIcons(registerIcon); // real AWS/GCP/Azure icons
    installFamousServiceIcons(registerIcon); // Datadog/Wiz/Firebase/etc.
    installThreeView(); // 3D view (three.js from CDN)

    const $ = (id) => document.getElementById(id);
    const selectedRadio = (name) => document.querySelector(`input[name="${name}"]:checked`)?.value;
    const samples = DEFAULT_ARCHMAP_SAMPLES;
    const fallbackSource = $("seed").textContent.trim();
    const sampleById = (id) => samples.find((sample) => sample.id === id);
    const defaultSample = sampleById(DEFAULT_ARCHMAP_SAMPLE_ID) ?? samples[0];
    $("src").value = defaultSample?.source ?? fallbackSource;
    const populateSamples = () => {
      const select = $("sample-select");
      select.innerHTML = "";
      const groups = new Map();
      for (const sample of samples) {
        if (!groups.has(sample.category)) {
          const group = document.createElement("optgroup");
          group.label = sample.category;
          groups.set(sample.category, group);
          select.appendChild(group);
        }
        const option = document.createElement("option");
        option.value = sample.id;
        option.textContent = sample.title;
        groups.get(sample.category).appendChild(option);
      }
      if (defaultSample) {
        select.value = defaultSample.id;
        select.title = defaultSample.description;
      }
    };
    populateSamples();
    const updateLineNumbers = () => {
      const count = Math.max(1, $("src").value.split("\n").length);
      $("line-numbers").textContent = Array.from({ length: count }, (_, i) => i + 1).join("\n");
    };
    $("src").addEventListener("input", updateLineNumbers);
    $("src").addEventListener("scroll", () => {
      $("line-numbers").scrollTop = $("src").scrollTop;
    });
    updateLineNumbers();
    const setEditorWidth = (clientX) => {
      const bounds = document.querySelector("main").getBoundingClientRect();
      const width = Math.min(Math.max(clientX - bounds.left, 260), Math.min(820, bounds.width * 0.62));
      document.querySelector("main").style.setProperty("--editor-width", `${Math.round(width)}px`);
    };
    $("resize-handle").addEventListener("pointerdown", (event) => {
      $("resize-handle").classList.add("is-dragging");
      $("resize-handle").setPointerCapture(event.pointerId);
    });
    $("resize-handle").addEventListener("pointermove", (event) => {
      if (!$("resize-handle").classList.contains("is-dragging")) return;
      setEditorWidth(event.clientX);
    });
    $("resize-handle").addEventListener("pointerup", (event) => {
      $("resize-handle").classList.remove("is-dragging");
      $("resize-handle").releasePointerCapture(event.pointerId);
    });
    $("resize-handle").addEventListener("pointercancel", () => {
      $("resize-handle").classList.remove("is-dragging");
    });
    let result = null;
    let tags = null;
    let abstractionLocked = false;
    let zoomFitted = false;
    const selectedOverlays = () => [...document.querySelectorAll('input[name="overlay"]:checked')].map((input) => input.value);
    const MIN_LOADING_MS = 220;
    let loadingSince = 0;
    let loadingHideTimer = 0;
    const showLoading = () => {
      window.clearTimeout(loadingHideTimer);
      loadingSince = performance.now();
      $("loading").style.display = "flex";
    };
    const hideLoading = () => {
      const remaining = Math.max(0, MIN_LOADING_MS - (performance.now() - loadingSince));
      window.clearTimeout(loadingHideTimer);
      loadingHideTimer = window.setTimeout(() => { $("loading").style.display = "none"; }, remaining);
    };
    const renderWithLoading = (action) => {
      showLoading();
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          try {
            action();
          } finally {
            if ($("diagram").querySelector(".archmap-prototype-flow-loading")) return;
            requestAnimationFrame(hideLoading);
          }
        });
      });
    };
    $("diagram").addEventListener("archmap:prototype-render-state", (event) => {
      if (event.detail?.state === "loading") showLoading();
      if (event.detail?.state === "ready") hideLoading();
    });
    const updateLog = (model) => {
      const log = [
        ...model.errors.map((d) => `<div class="err">✖ ${d.code}: ${d.message}</div>`),
        ...model.warnings.map((d) => `<div class="warn">▲ ${d.code}: ${d.message}</div>`),
      ];
      $("log").innerHTML = log.join("") || '<div style="color:#1a7f37">✓ no diagnostics</div>';
    };
    function draw() {
      if (result) { result.destroy(); result = null; }
      updateLineNumbers();
      const model = parse($("src").value);
      result = render(model, { baseView: selectedRadio("base-view"), renderMode: selectedRadio("render-mode"), overlays: selectedOverlays(), abstractionLocked, target: $("diagram") });
      updateLog(result.model);
    }
    function updateOverlay(input) {
      updateOverlayValue(input.value, input.checked);
    }
    function updateOverlayValue(value, checked) {
      renderWithLoading(() => {
        if (!result) { draw(); return; }
        if (checked) result.addOverlay(value);
        else result.removeOverlay(value);
        updateLog(result.model);
      });
    }
    function updateBaseView() {
      renderWithLoading(() => {
        if (!result) { draw(); return; }
        result.setBaseView(selectedRadio("base-view"));
        updateLog(result.model);
      });
    }
    function updateRenderMode() {
      renderWithLoading(() => {
        if (!result) { draw(); return; }
        result.setRenderMode(selectedRadio("render-mode"));
        updateLog(result.model);
      });
    }
    function applySample(sample) {
      $("src").value = sample.source;
      $("sample-select").value = sample.id;
      $("sample-select").title = sample.description;
      abstractionLocked = false;
      zoomFitted = false;
      tags?.setState({ ...sample.recommendation, abstractionLocked });
      updateLineNumbers();
    }
    tags = createDiagramTags({
      target: $("diagram-tags"),
      state: { ...(defaultSample?.recommendation ?? { baseView: "overview", renderMode: "2d", overlays: [] }), abstractionLocked },
      actions: ["toggleSize", "fit", "lock", "download", "fullscreen"],
      onChange: (_state, event) => {
        if (event.kind === "baseView") updateBaseView();
        if (event.kind === "renderMode") updateRenderMode();
        if (event.kind === "overlay") updateOverlayValue(event.value, event.checked);
      },
      onAction: (action) => {
        if (action === "fit") {
          if (!result) return;
          if (zoomFitted) {
            result.reset();
            zoomFitted = false;
          } else {
            result.fit();
            zoomFitted = true;
          }
        }
        if (action === "lock") {
          abstractionLocked = !abstractionLocked;
          result?.setAbstractionLocked(abstractionLocked);
        }
        if (action === "download" && result) {
          void result.downloadPng("archmap.png").catch((error) => console.error("ArchMap PNG export failed.", error));
        }
        if (action === "fullscreen") {
          $("diagram-tags").parentElement.classList.toggle("is-fullscreen");
          requestAnimationFrame(() => result?.fit());
        }
      },
    });
    $("sample-select").addEventListener("change", () => {
      const sample = sampleById($("sample-select").value);
      if (!sample) return;
      renderWithLoading(() => {
        applySample(sample);
        draw();
      });
    });
    $("run").addEventListener("click", () => renderWithLoading(draw));
    draw();
  </script>
</body>
</html>
