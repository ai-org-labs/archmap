<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ArchMap screenflow map sample</title>
  <style>
    :root {
      color-scheme: light;
      --page-bg: #edf2f7;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #64748b;
      --line: #d7dee9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font: 14px system-ui, sans-serif;
      color: var(--ink);
      background: var(--page-bg);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 16px;
      background: #1c2733;
      color: #fff;
    }
    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
    }
    header span {
      color: rgba(255,255,255,.68);
      font-weight: 500;
    }
    main {
      min-height: 0;
      padding: 16px;
    }
    .viewer-shell {
      height: calc(100vh - 82px);
      min-height: 640px;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: 0 14px 40px rgba(15,23,42,.10);
    }
    archmap-viewer {
      display: block;
      width: 100%;
      height: 100%;
    }
    .note {
      color: rgba(255,255,255,.72);
      font-size: 12px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <header>
    <h1>ArchMap <span>ScreenFlow map sample</span></h1>
    <div class="note">Images connected by transition arrows · Map / Play switchable</div>
  </header>
  <main>
    <div class="viewer-shell">
      <archmap-viewer
        src="./screenflow.archmap"
        base-view="prototype"
        render-mode="2d"
        overlays="dataflow,boundary,validation"
        scenario="happy_path"
        controls
        diagnostics
      ></archmap-viewer>
    </div>
  </main>

  <!--
    Local build import map. Run `npm run build`, then open this file from the
    dev server or from a packaged `examples/` directory.

    CDN equivalent after publishing 0.1.2:
    "@archmap/core": "https://cdn.jsdelivr.net/npm/@archmap/core@0.1.2/dist/archmap.js"
  -->
  <script type="importmap">
  {
    "imports": {
      "@archmap/core": "../dist/archmap.js"
    }
  }
  </script>
  <script type="module">
    import { defineArchMapViewerElement } from "@archmap/core";

    defineArchMapViewerElement();
  </script>
</body>
</html>
