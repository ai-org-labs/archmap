name: Deploy viewer to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Assemble Pages site
        run: |
          mkdir -p _site
          cp -R dist examples docs _site/
          cp README.md SPEC.md LICENSE THIRD_PARTY_NOTICES.md _site/
          cp examples/demo.html _site/index.html
          node - <<'NODE'
          const fs = require("node:fs");
          const path = "_site/index.html";
          const html = fs.readFileSync(path, "utf8").replaceAll("../dist/", "./dist/");
          fs.writeFileSync(path, html);
          NODE

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
